name: go-task
target:
  registry: ocx.sh
  repository: go-task

source:
  type: github_release
  owner: go-task
  repo: task
  tag_pattern: "^v(?P<version>\\d+\\.\\d+\\.\\d+)$"

assets:
  linux/amd64:
    - "task_linux_amd64\\.tar\\.gz$"
  linux/arm64:
    - "task_linux_arm64\\.tar\\.gz$"

asset_type:
  type: archive
  strip_components: 0

metadata:
  default: metadata.json

skip_prereleases: true
cascade: true
build_timestamp: none

versions:
  min: "3.49.1"
  new_per_run: 5
  poll_interval: "0 */6 * * *"

verify:
  github_asset_digest: true

concurrency:
  max_downloads: 8
  max_bundles: 4
  max_pushes: 2
  rate_limit_ms: 100
  max_retries: 3
  compression_threads: 0

tests:
  - name: smoke
    script: tests/smoke.star

platforms:
  linux/amd64:
    runner: ubuntu-latest
  linux/arm64:
    runner: ubuntu-24.04-arm

notify:
  discord:
    webhook_secret: OCX_MIRROR_DISCORD_HOOK
